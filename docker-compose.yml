version: '3.8'
services:
  app:
    build:
      context: .
      target: development
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=true
      - DB_URL=sqlite:///trading_predictor.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
      - ./cache:/app/cache
      - ./models:/app/models
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
